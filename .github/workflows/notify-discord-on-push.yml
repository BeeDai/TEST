name: Notify Discord on Push

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Notify all pushed commits with single header and count (Skip Merge)
        shell: bash
        run: |
          # コミット情報取得
          commits='${{ toJson(github.event.commits) }}'
          actor='${{ github.actor }}'
          branch='${{ github.ref_name }}'
          head_message='${{ github.event.head_commit.message }}'
          length=$(echo "$commits" | jq length)

          # 最新コミットがMergeコミットの場合はPush通知を送らない
          if echo "$head_message" | grep -qi '^Merge'; then
            exit 0
          fi

          # メッセージ本文の初期化（ヘッダー付き）
          content="# 📢 GitHubにPushがありました！"
          content="$content\n> 🌿 **ブランチ：$branch**"

          # 有効なコミットがあったかのフラグ
          valid_commit_found=false

          # コミット番号カウンター初期化
          count=1

          # 各コミットをループ
          for i in $(seq 0 $((length - 1))); do
            iso_time=$(echo "$commits" | jq -r ".[$i].timestamp")
            formatted_time=$(TZ=Asia/Tokyo date -d "$iso_time" "+%Y年%m月%d日%H:%M:%S")
            message=$(echo "$commits" | jq -r ".[$i].message" | sed 's/"/\\"/g')

            # Mergeコミットはスキップ
            if echo "$message" | grep -qi '^Merge'; then
              continue
            fi

            # 番号付きでコミット情報を本文に追記
            content="$content\n## No.$count\n> ## 👤 by $actor\n> **🕒 $formatted_time**\n> 💬 $message"

            # 有効コミット発見フラグON
            valid_commit_found=true

            # カウンターを増やす
            count=$((count + 1))
          done

          # 有効なコミットがあれば通知
          if [ "$valid_commit_found" = true ]; then
            payload=$(jq -n \
              --arg content "$(printf '%b' "$content")" \
              '{content: $content}')

            curl --fail-with-body \
              -X POST \
              -H "Content-Type: application/json" \
              -d "$payload" \
              "${{ secrets.DISCORD_WEBHOOK }}"
          fi