name: Notify Discord on Branch Delete

on:
  delete:

jobs:
  notify:
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest

    steps:
      - name: Notify deleted branch
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ACTOR: ${{ github.actor }}
          DELETED_BRANCH: ${{ github.event.ref }}
        run: |
          # 現在時刻を日本時間で取得
          formatted_time=$(TZ=Asia/Tokyo date "+%Y年%m月%d日%H:%M:%S")

          # メッセージ本文作成
          content="# 🗑️ GitHubのブランチが削除されました！"
          content="$content\n> 🌿 **ブランチ：$DELETED_BRANCH**"
          content="$content\n> ## 👤 by $ACTOR"
          content="$content\n> **🕒 $formatted_time**"

          # Discord送信用JSONを作成
          payload=$(jq -n \
            --arg content "$(printf '%b' "$content")" \
            '{content: $content}')

          # Discordへ通知
          curl --fail-with-body \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK"